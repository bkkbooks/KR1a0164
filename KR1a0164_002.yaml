body:
  text: 易緯稽覽圖卷下漢鄭康成注小過蒙益漸泰寅需隨晉解大壯卯豫訟蠱革夬辰旅師比小畜乾已大有家人井咸姤午鼎豐渙履遁未恆節同人損否申巽萃大畜賁觀酉歸妹無妄明夷困剝戌艮既濟噬嗑大過坤亥未濟蹇頥中孚復子屯謙暌升臨丑坎六震八離七兊九已上四卦者四正卦為四象每歲十二月每月五月按月字當作卦卦六日七分每朞三百六十六日每四分按六日當作五日四分當作四分日之一甲寅伏羲氏至無懷氏五萬七千八百八十二年神農五百四十年黃帝一千五百二十年少昊四百年顓頊五百年帝嚳三百五十年堯一百年舜五十年禹四百三十一年殷四百九十六年周八百六十七年秦五十年已上六萬三千六百一十二年庚戌年四百九十一年算上右總六萬四千一百三年相基加二年按基當作朞推軌當日術曰置軌以其歲之日除之得軌不盡日每分即日之分也推折當日術曰以二十四除折數所得是日軌折皆當歲之折有餘如上復一十三二十五臨二十四二十六泰三十五二十七大壯四十六二十八夬五十七二十九乾六十八三十姤七十九三十一遁八二十三十二否九二十一三十三觀十二十二三十四剝十一二十三三十五坤十二二十四三十六按以上三十六數周而復始原本於觀剝坤下全脫今補入震三十七巽三十八坎三十九離四十艮四十一兊四十二已上勾者是勘銘軌加之本經並無只有單數不勾耳按此條乃後人標識之辭原本混入正文今姑存其舊而用細字夾注以別之右易姓四十二消息三十六六子在其數合八十四戒各有所繫而出之純德有七其三法天其四法地天三者三六十八四地四者四六二十六十四卦策術曰陽爻九以四時乘之得三十六隂爻六以四時乘之得二十四軌術曰陽爻九七各以四時乘之而并倍之得一百二十八隂爻八六各以四時乘之而并倍之得一百一十二假令乾六位老陽爻九四時乘之四九三十六以三十六乘六爻得二百一十六少陽爻七以四時乘之四七二十八按二語應作夾注原本混入正文今改正以二十八乘之六爻得一百六十八已上二數合得三百八十四因而倍之有七百六十八假令坤六位老隂爻六四時乘之四六二十四以二十四乘六爻得一百四十四少隂爻八四時乘之四八三十二以三十二乘之六爻得一百九十二已上二數合得三百三十六因而倍之有六百七十二乾坤二軌數合有一千四百四十他卦隨隂陽爻倍之凡陽爻用六十四為法乘得倍之凡隂爻用五十六為法乘得數倍之推一百九十二爻術曰置六十四卦折半有三十二以六乘之得陽爻一百九十二隂爻亦一百九十二合二數得三百八十四又法六爻以八乘之得四十八又八乘四十八得三百八十四爻也從伏羲天元甲寅已來至大唐貞元年乙亥積二百七十六萬一千二百二十算至元和年三月二百七十六萬一千二百三十一算按此文至唐元和年當亦後人所加今退二字附書之一乾世戍初子坤世酉初未二合折三百六十分各乾二百一十六坤一百四十四二軌合一千四百四十分各乾七百六十八坤六百六十二二屯世寅初寅蒙世戍初巳二合折三百三十六分各屯一百六十八蒙一百六十八二軌合一千四百八分各屯七百四蒙七百四三需世申初辰訟世午初卯二合折三百八十四分各需一百九十二訟一百九十二二軌合一千四百七十四分各需七百三十七訟七百三十七四師世午初午比世卯初丑二合折三百十二分各師一百五十六比一百五十六二軌合一千三百七十六分各師六百八十八比六百八十八五小畜世子初申履世申初亥二合折四百八分各小畜二百四履二百四二軌合一千五百四分各小畜七百五十二履七百五十二六泰世辰初戍否世卯初酉二合折五百六十分各泰二百八十否二百八十二軌合一千四百四十分各泰七百二十否七百二十七同人世亥初子大有世辰初未二合折四百八分各同人二百四大有二百四二軌合二千五百四分各同人七百五十二大有七百五十二八謙世亥初寅豫世未初巳二合折三百一十二分各謙一百五十六豫一百五十六二軌合一千三百七十六分各謙六百八十八豫六百八十八九隨世辰初辰蠱世酉初卯二合折三百六十分各隨一百八十蠱一百八十二軌合一千四百四十分各隨七百二十蠱七百二十十臨世卯初午觀世未初丑二合折三百三十六分各臨一百六十八觀一百六十八二軌合一千四百八分各臨七百四觀七百四十一噬嗑世未初申賁世卯初亥二合折三百六十分各噬嗑一百八十賁一百八十二軌合一千四百四十分各噬嗑七百二十賁七百二十十二剝世子初戍復世子初酉二合折三百一十二分各剝一百五十六復一百五十六二軌合一千三百七十六分各剝六百八十八復六百八十八十三無妄世午初子大畜世寅初未二合折三百八十四分各無妄一百九十二大畜一百九十二二軌合一千四百九十二分各無妄七百四十六大畜七百四十六十四頥世戍初寅大過世亥初巳二合折三百六十分各頥一百六十八大過一百九十二二軌合一千四百四十分各頥七百四大過七百三十六十五坎世子初辰離世子初卯二合折三百六十分各坎一百六十八離一百九十二二軌合一千四百四十分各坎七百四離七百三十六十六咸世申初午恆世酉初丑二合折三百六十分各咸一百八十恆一百八十二軌合一千四百四十分各咸七百二十恆七百二十十七遁世午初申大壯世午初亥二合折三百八十四分各遁一百九十二大壯一百九十二二軌合一千四百七十二分各遁七百三十六大壯七百三十六十八晉世酉初戍明夷世丑初酉二合折三百三十六分各晉一百六十八明夷一百六十八二軌合一千四百八分各晉七百四明夷七百四十九家人世丑初子睽世丑初未二合折三百八十四分各家人一百九十二睽一百九十二二軌合一千四百七十二分各家人七百三十六睽七百三十六二十蹇世申初寅解世辰初巳二合折三百三十六分各蹇一百六十八解一百六十八二軌合一千四百八分各蹇七百四解七百四二十一損世丑初辰益世辰初卯二合折三百六十分各損一百八十益一百八十二軌合一千四百二十分各損七百二十益七百二十二十二夬世酉初午姤世酉初丑二合折四百八分各夬二百四姤二百四二軌合一千五百四分各夬七百五十二姤七百五十二二十三萃世巳初申升世丑初亥二合折三百三十六分各萃一百六十八升一百六十八二軌合一千四百八分各萃七百四升七百四二十四困世寅初戍井世戍初酉二合折三百六十分各困一百八十井一百八十二軌合一千四百四十分各困七百二十井七百二十二十五革世亥初未鼎世亥初寅二合折三百八十四分各革一百九十二鼎一百九十二二軌合一千四百七十二分各革七百三十六鼎七百三十六二十六震世戍初寅艮世寅初巳二合折三百三十六分各震一百六十八艮一百六十八二軌合一千四百八分各震七百四艮七百四二十七漸世申初午歸妹世丑初卯二合折三百六十分各漸一百八十歸妹一百八十二軌合一千四百四十分各漸七百二十歸妹七百二十二十八豐世申初午旅世辰初丑二合折三百六十分各豐一百八十旅一百八十二軌合一千四百四十分各豐七百二十旅七百二十二十九巽世卯初申兊世未初亥二合折三百八十四分各巽一百九十二兊一百九十二二軌合一千四百七十二分各巽七百三十六兊七百三十六三十涣世巳初戍節世巳初酉二合折三百六十分各渙一百八十節一百八十二軌合一千四百四十分各渙七百二十節七百二十三十一中孚世未初子小過世午初未二合折三百六十分各中孚一百八十小過一百八十二軌合一千四百四十分各中孚七百三十六小過七百四三十二既濟世亥初寅未濟世未初巳二合折三百六十分各既濟一百八十未濟一百八十二軌合一千四百四十分各既濟七百二十未濟七百二十其下初合六十四卦流轉推之術置天元甲寅巳來至受命以三十二除之餘不足除者從乾坤始數算外主卦而取世隂陽斷之世陽從陽陽爻三十六世隂從隂隂爻二十四陽從九除隂從六除啇得數陽以三乘之隂以二乘之因而半之即是忌耳每取卦月乘之假令賁卦世在初十一月卦世屬陽陽爻三十六以九除之商得四以三乘之得十二因而半之是忌耳假令遁卦世在三六月卦世屬隂隂之爻二十四以六除之商得四以二乘之得六因而半之是忌耳按以上二節闡明世卦推算之法當是後人所附益今退二字書之推厄法以入位年數除之軌合數算盡厄也甲乙饑丙丁為旱戊己為中興庚辛為兵壬癸為水按此節別見後文疑有重出父相甲寅景雲元年庚戍積六萬四千三年算上至開元九年辛酉加上十一年算上以三十二除之不盡三名入位年合入需軌卦隂爻二十四以六除之商得四二乘之得八因而半之四是忌需卦軌合數一千四百七十二以入位年三至甲寅加四算七除需合數除二從父相庚申命之得辛兵推子厄用父軌凡子受位但不得别立軌乃可救災耳甲寅先天元年壬子積六萬四千五年算上至開元九年辛酉加九算上三十二除之餘五十盡五合入小畜軌卦十一月陽爻三十六以九除之啇得四以三乘之十二因而半之得六忌按上推算至唐開元九年亦唐時術士所加也右六十四卦流轉注十二之辰按此句為總題折軌三十六卦位之文不應在此處蓋後人以他文闌入遂將原文移向後耳乾初子坤初未陽爻折數一爻三十六計六千九百一十二陽爻軌數一爻一百二十八計二萬四千五百七十六隂爻折數一爻二十之四計四千六百八隂爻軌數一爻一百一十二計二萬一千五百四隂爻又合折一萬一千五百二十合二軌四萬一千八十於易即位年數術曰已上各三十二乘之即得其數乘軌折之數世屬陽卦者以九除之以三乘之所得因而半之則是即位期也能過此者三乘所半之數即終矣世屬隂卦者以六除之以二乘之所得因而半之則得即位期也能過此者加所得即中期也復能過此者以二乘所半之數即終矣以九除之皆盡無餘者陽以三乘所則其年當數也以九六除之有餘者以所得乘之陽得正位增九於所乘隂得正位增六於所乘則是位之數也用陽日者屬陽卦用隂日者屬隂卦乾初以六乘者謂姤也隂失位在初坤初以九乘者謂復也陽得正位在初震兊離之象隂所乘之數也巽艮之象四所乘之數是即位之時年數也卦軌軌陽爻六七以四時乘之各倍之爻百二十八隂爻八六以四時乘之各倍之爻百十二必用即位年以即位時太歲呼之盡算之上則位之終歲也算外是未入之年孔子曰終始之義在外內焉進退在二年觀其政以别知其泰延與否也推之術曰置天元甲寅以來數至受命位之年數以三十二數除之不足除者以乾坤始數算未即得主歲之卦知直事之爻在何辰謂乾直事於十一月子左行陽辰六坤直事於六月未右行隂辰六隂陽交錯行於十二辰一歲十二月而周也當以即主立時月為政故曰知直事之爻在何辰也所屬隂陽爻者也陽爻三十六隂爻二十四者皆世所屬隂陽者也推之法隂卦推世之所屬隂卦者假令即位之年得遁卦七月申也遁六月二隂爻隂爻二十四以六除之得四以二乘之得八因而半之得四則即位之期也能過此者所乘八歲之中期也復能過此者三乘所半十二歲終矣隂得正位增六於所乘為三十六年終矣推之法陽卦推世之所屬陽卦者假令即位之年得賁卦十月亥也賁初陽爻三十六以九除之得四以三乘之得十二因而半之則得六則是即位之期也能過此者如所乘得一十則中期也復能過此者三乘所半六得十八年終矣陽得正位增九以所乘為五十四巽艮之家四所乘得三十六遠期算天元甲寅歲以來至宋髙祖劉裕禪晉歲在庚辰號為永初元年凡得積年二百七十六萬八百四十七年算上以三十二半六十四卦得三十二以為法除之不盡十五入坎離軌以宋辛酉至周宣帝宣政元年戊戌歲有一百五十八年元嘉元年即當魏氏世祖太武皇帝始光元年以三十二除之不盡七命之入大有軌一本云不盡十三為入無妄大畜軌六月未也六月位隂爻八以四乘之八得三十二以六除之得五餘不盡二以二乘之得十因而半之得五初忌能過此者如所乘得十復能過此者三乘所半五得十五終矣不忌失位隂增八終二十三除之得四十七丙午歲天下憂重侵逼也有餘福也假令失位陽者四七二十八以九除之得三餘不盡一以三乘所得九因而半之得四有餘則是即位初期能過此者得九中期也增復能過此者得十三年終矣下期失位陽七於所乘得四十二厄所遭有餘算福之也假令得位隂在六四六二十四以六除之得四無餘以二乘之得八因而半之得四初忌能過此者得八中忌復能過此者得十二終矣下忌得位隂增六於乘得三十六厄所遭也假令得位陽在九四九三十六九除之得四無餘以三乘之得十二因而半之得六六初忌能過此者中忌也復能過此者得十八忌終也得位陽增九於所乘得九五十四忌所遭也按以上自推之術以下皆後人因卦軌之義而闡衍其法故推至南北朝年數非易緯本文也推厄所遭法以入位年數餘軌數算盡厄所遭甲乙為饑丙丁為旱戊己為中興庚辛為兵壬癸為水元算為月按此文已見前此處疑復見或亦後人所引耳宋軌七百三十六庚申歲至今甲子歲宋元嘉元年甲子宋髙祖第二息文帝義隆年號為入位五年以五除軌數上所得積周一百四十七餘所一厄所遭也丙寅歲入位七年以七除軌數上得積周一百五軌命得庚寅主兵其年起兵荆州謝晦也癸未歲入位二十四年以除軌數上得積周三十餘十六不盡以庚申命之得乙亥乙主饑其年河南大饑豫州人相食甲申歲入位二十五年除軌數上積得二十九餘不盡十一以庚申命之得庚午庚主兵馬其年九州發兵征蠻乙酉歲入位二十六年除軌數上得積周二十八不盡八以庚申命之得丁卯丁主旱其年大旱不收豆麥豫州禾粟皆旱死七丙戌歲入位二十七年除軌數上得積周二十餘不盡七以庚申命之得丙丙主旱其年淮北二州春旱不能種稻餘丁亥歲入位二十八年除軌數上積周三十六不盡八以庚申命之得丁卯丁主旱其年大旱五戊子歲入位二十九年除軌數上得積周二十不盡十一以庚申命之得庚午庚主兵其年大兵餘己丑歲入位三十年除軌數上得積周二十四不盡十六以庚申命之得乙亥乙主饑其年荒糴貴庚寅歲入位三十一年除軌數上得積周二十三不盡二十三以庚申命之得壬壬主水其年徐兖州大水官軍因勢泛舟至滑臺虜走後果失利也不辛卯歲入位三十二年除軌即算死所遭也以盡法二十三於上方除餘三十二以庚申命之得辛卯辛主兵其年魏兵至江淮餘壬辰歲入位三十三年除軌數上得積周二十不盡以庚申命之得己巳己主中興一癸巳歲入位三十四年除軌數上得積周二十餘不盡二十二以庚申命之得辛巳辛主兵其年二月二十日甲子東宫大逆按以上宋軌取宋文帝在位年數依法推算穿鑿無謂文義亦不倫蓋為後人淺陋者所加今改用細字附注推軌之術以天元甲寅已來至今受命位之年以三十二除之餘不盡從乾坤始數算則得主歲之卦知直事之辰在何辰以甲寅年至大唐先天元年壬子積二百七十六萬一千一百三十九以三十六或云以十二除之積八萬六千二百八十五周不盡十九入家人睽軌至元和十四年合二百七十六萬一千二百三十六元和十五年庚午或云庚子積二百七十六萬一千二百四十七法陽爻以老陽數乘之隂爻以老隂數乘之隨六爻隂陽多少乘訖并之為分各數倍分各為折合數也按上推軌之術與前文略同而重復錯見者蓋前為南北朝術士所發明而此推至元和十五年則又唐人所附益也中孚純坎公丨初六冬至十一月中廣漠風解純震丨初九春分二月中明庶風咸純離丨初九夏至五月中凱風按乾元序制記作景風賁純兊丨初九秋分八月中閶闔風屯侯丨九二小寒十二月節豫六二清明三月節鼎六二小暑六月節歸妹九二寒露九月節升公六三大寒十二月中日在坎革六三穀雨三月中日在震履九三大暑六月中日在離困六三霜降九月中日在兊小過侯六四立春正月節條風旅九四立夏四月節按此下當脫溫風二字恆九四立秋七月節涼風艮九四立冬十月節按此下當脫不周風三字漸公九五雨水正月節小畜六五小滿四月中損六五處暑七月中大過九五小雪十月中需侯上六驚蟄三月節大有上六芒種五月節巽上九白露八月節未濟上六大雪十月節按以上以四正卦爻配二十四氣其說亦見於乾元序制記當是易緯本文冬至日在坎春分日在震夏至日在離秋分日在兊易緯是類謀以此四正之卦卦有六爻爻主一氣餘六十卦卦主六日七分八十分日之七正歲三歲六十五日四分日之一六十而一周乾象以中孚當十一月六十中氣後十五日准兩卦强可得十二月餘少三日當取十二月卦日也右各以六日於决次乃不可簡取其孤如此非是驗也以易緯推之無勞更算二十四氣以成