body:
  text: 易緯稽覽圖卷上漢鄭康成註推天元甲子之術置天元已来年數以六十去之不滿六十者以甲子始數筭盡之上所得之日即生嵗之卦諸變皆如卦十所年嵗月朔日辰直子日者即主今月之卦今日辰直五子之日即是今日之卦也諸改變異並與嵗同占至嵗之卦當隨太嵗而移之行一子終則反始無有窮也年至今随己亥三十六年矣推易天地人之元術先置天元太初癸巳元年一百九十萬八千八百五十三嵗乃始太初元年已来載數至所求年嵗上以六十除之不滿六十者以從甲子所數筭盡者之上即今嵗用事已上冩出一紙本經易緯無之此於三備上錄出以廣本耳其所冩三備並從前立卦者皆不冩以縁此本有更不能再出故此本兩存耳從後即是易緯本經非三備所有也易天地人道元至宋元嘉元年一百九十萬六千三百八十算外從元年至今大唐上元二年乙亥又積三百三十八年按以上推衍天元嵗數乃後世術士所加非易緯本經據馮椅引中興舘閣書目有李淳風續注易緯其一推天元甲子之術其二推易天地人之元術與此相合疑即出淳風續注本也原本此文與甲子卦起中孚句相連屬乃傳冩淆混黄震日抄謂此書言至今大唐上元二年乙亥卦起中孚亦悞連正文讀蓋南宋冩本已然今退二字書之以别於正文甲子卦氣起中孚卦氣陽氣也中孚卦名也中者和也孚者信也經言中孚豚魚言庶人養也舉庶人言之其所養微也言微陽生於坎而為雷聲尚未聞於人而知於律厯俞助作也若言天子出耕諸侯當而耕也故以言之氣按後漢書郎顗𫝊注引此文作卦氣起中孚原本脱字今補入又注文自雷聲尚未聞於人以下文義與上不合似非本注據郎顗𫝊注所引甲子卦氣起中孚六日八十分之七二語本連屬成文而此本後文隂還雨隂威色注内陽生於坎氣尚微云云皆言卦起起中孚之義與此注所養微云云詞義符合當為此注原文無疑其下即與六日八十分之七句相接太陽一二云云恐亦非本經次第蓋舊時𫝊冩錯互遂併正文而亂之今既無别本可證未敢釐定姑仍舊文而附識所疑於此太陽一二以上自雷雷聲太陽謂一月大壯一二者陽爻在上雷聲盛聞於人得自雷其卦中是消息臣強君弱雷從觧起之按此文自雷雷聲義不可通而郎顗𫝊引孔子曰雷始𤼵大壯始君弱臣強從觧起與此注相合疑正文亦有脱誤當雷不雷太陽弱春分之後當雷不雷君弱於道徳也按此文亦郎顗𫝊所引不當雷而雷太陽弱秋分之後不當雷而雷此君弱干度誅罰不行邪臣䟦扈於下陽氣放洩則雷冬行亂冬傷陽也不少陽為雷上侵之比也離卦九三用事而雷臣欲侵其君之否也按正文不字疑衍文先白乃當雷至秋分日色先白則知秋分後必當雷不雷者刺其君春分之後雷秋分之後不當雷若反雷必逆也降隂下迎隂起合和而陽氣用上薄之則為雷陽氣風也雷有聲名曰雷有光名曰電按此句舊本混入注文今訂正迎隂獨起陽上薄之其電炎炎也漫漫也其電淳淳也此君臣不和之象也隂陽和合其電燿燿也其光長而雷殷殷也此君臣道和謂三氣合也三氣者降氣下迎隂氣起風氣上薄之和合電為之雷空虚有賢人之當其實者也故曰殷殷也按孫㲄古微書引此文作為電煇煇也未詳所據非太平而雜卦以其度效一辰則可矣雜卦九三上六决温九三上九微温六三上九决寒六三上六微寒曰七分中一辰效則可也按九三上六舊本作九三上九九三上九舊本作六三上九今據後注文改唯消息及四時卦當盡其日寒温之氣消息盡六日七分四時七十三分也太平之時太隂用事謂從否至臨也而少陽卦當效時至則於效分上一時雜卦用事至於三爻三初九三上六决温九三上九微温臨分上辰也衍按注三爻下三初二字疑文非太平以其卦分效則可以其六日七分一分效則可矣未可責時至立效也太陽用事謂從泰至遯少隂卦爻亦如之雜卦用事效六三上九决寒六三上六微寒亦如效少陽也凡形體不相應形謂白濁清凈可得而見故言形體者以身體寒濁也不相應者温不清凈寒白濁也皆有其事而不成也其在位者有徳而不行也徳者帝王之道其在位者廢而不行故不相應之道也有貌無實白濁清凈效寒温不效此佞人之類也有實無貌寒温效白濁清凈不效此賢者之類屈道仕也故言從其類也上為貌也寒温為實白濁清凈其上貌寒温者是為實温為尊寒為卑温喻君寒喻臣君當施生臣當奉命尊卑等也故尊見卑益自尊卑見尊益自卑則寒温决絶矣九三應上六六三應上九則寒温决絶可知兩尊兩卑無所别君臣道卑不能相使則寒温微不絶决六三應上六寒不絶决難别知也按注六三原本作九三今據後注文改隂陽升所謂應者地上有隂而天上有陽曰應六三應上九寒相應寒温白濁俱隂曰罔六三應上六兩隂無相見之意故無應者天欎然而罔也地上有陽而天上有隂曰應九三應上六隂陽相應清凈寒温按地上有陽十一字原本混入注文今訂正俱陽曰罔九三應上九兩陽無相見之意曰罔罔故為亡也小畜乾位比比九三陽爻故言比然息之卦當勝雜卦也九三俱當温乾之温當有不效者至衝事𤼵矣盛氣行也何以夷狄來朝消息效四時效乃來朝也一曰少陽卦不效為水太温甚者為旱為秋榮冬雪少隂不效為旱為賊為兵雖消息及四時卦效各盡其日息卦主祿消卦主刑四時四方主刑兵故曰左右前後字按後文上有隂百二十日為雨注内勝小畜温也五似當為此處本注而錯入彼注者其自消息效四時效以下乃論卦效之騐與正文不相應似又當在後文左為右前為後之下而簡錯在此也降陽為風上九用事卦效後一百二十日降為卒風其不效也後九十一日降為災風天惡氣不得上天中九十一日為災風其隂不時卦四方生形也故曰降陽必為其風按注文其隂不時句疑有脱誤生形疑當作主刑降隂為雨上九用事卦效後一百二十日降隂為雨按注上九用事九疑作六昇氣上降氣微君弱臣強不得以時昇降昇氣喻君降氣喻臣也是故陽還其風必暴君弱臣强君令不得行降氣積後一百三十日内隂得同類并下故薄故必暴也隂還其雨亦暴臣强君弱君澤不得行降氣道積後一百三十日内得同類并下故薄也一曰昇降氣為隂陽卦昇於九三六三寒温過暴疾起時降氣而上也降氣盛至十日七日近三日四日其降也有鳴風之文發屋折木之風是一百三十日故曰還也按正還字之上原本脱隂字今據後文補入降陽之風動不鳴條動摇萬物和適不迅疾鳴條也降隂之雨潤不破塊潤澤和適不疾沛破塊四按孫㲄古微書引此文與降隂為雨句相屬疑以上語本俱在降陽為風降隂為雨二語之下或有倒簡耳還風者善令還也還暴也君出善令盖者若百姓君弱臣强還而不行陽氣道積不以時降後得同類并下故暴也故曰令還也隂還雨隂威色還暴隂陽生於坎氣尚微寒温未知萬物變形律氣先得中孚卦氣乃信愛而飬之故言卦氣起中孚也按正文隂威色疑當作隂威也又注與正文不相應俱應為簡首卦氣起中孚句注文盖因陽生於坎四字相近錯誤在此而反佚其本注耳六日八十分之七六以候也八十分為一日之七者一卦六日七分也按自此文以下至左為右前為後皆論卦氣之法應依漢書注所引與卦氣起中孚句相從卷中錯簡頗多今但隨文致疑未敢擅改而從從得一卦四時卦十一辰餘而從四時卦者謂四正卦坎離震兊四時方伯之卦也十一辰餘者七十三分而從者得一之卦也坎常以冬至日始效坎北方卦名微陽所生卦效為夷不侵以温效為四夷來侵也復生坎七日復卦各生坎七日復時一陽生於隂之下陽氣交故經言七日来復一正之者也消息及雜卦𫝊相去各如中孚消息六日七分四時卦七十三分太隂用事如少陽卦之效也一辰其隂效也盡日大隂謂消也從否卦至臨為太隂雜卦九三為少陽之效雜卦九三行於太隂之中效微温一辰其餘皆當隨太隂為寒其隂效也盡日為雜卦六十三行於太隂中盡六日七分也原按正文少陽原本作少隂一辰本一隂今俱据文改正太陽用事而少隂卦之效也一辰其陽也盡日太陽謂消息也從泰卦至遯為太陽雜卦六三行於太陽之日中效微寒一辰其餘皆當随太陽為温效盡六日七分也按注文謂消息也消字衍又微寒原本作微陽今据文改正消息及四時卦各盡其日消息盡六日七分四時盡七十三分卦身效弱也五弱於道徳四時卦身效為兵以寒侵為兵氣所起兵所致也以温為夷狄相攻之道也左為右前為後東方為左西方為右南方為前北方為後一百二十日降為卒雨其有陽一百二十日而風謂上九用事後一百二十日降為卒風按注中一百二十日以下云云俱應在後文上有隂百二十日為雨句下彼注中上六用事後五字當在此注二百二十日降為卒雨九字之上自其有陽至而風十字復當為正文謂上九至卒風十五字復當為注文疑𫝊冩者以後字文相同而錯誤在此又混正文入注遂不可辨耳諸卦氣温寒清濁各如其所諸卦謂六十四卦也氣謂用事所當效氣温寒清濁各如其所者九三上九清濁微九三上六當温其微白濁故名各如之其所也説寒則當白濁則凈消此四時氣候也各當得其正也侵消息者温卦以温侵寒卦以寒侵或隂専政或隂侵陽陽者君隂者臣臣専君政事亦隂侵陽臣謀殺其君亦隂侵陽也按後漢書郎顗傳注引此文作隂専政舊本訛隂為陽今据改侵之比先蒙蒙之比非一也先蒙者臣將欲侵其君亂氣而起霧冐之故先蒙内按陸徳明釋文引稽覽圖云無以教天下曰蒙今本無此語或即此處佚文也三則震消息比三卦蒙盡六日七分則震者地動隂正蒙也隂不靜臣氣盛故地動故曰三則震専政者言隂為之雖正不得専也猶當歸之於陽臣當為而後為之復行之也専之一則震臣専君政甚則非其必待三也一則震矣甚者一卦六日以寒隂加以還風而温蒙侵消息後九十日則震還矣以風雨止時為期侵甚則蝕矣其加寒温食非必待三時也一侵則食矣其加温寒謂春夏寒大過秋冬温疾風𤼵屋折木太陽無光有影無形正按侵甚則蝕矣其加寒温九字當為文原本混入注中今訂正原其劇易一則震一則蝕易乃三震三日乃蝕故曰原其劇易之道也賊隂逆霣者霜賊隂者言人忍壊賊治人也逆者非其時霣者從上也霜者霜以非時殺物無霜而殺物亦賊之隂故陽虐之應旱霣霜以殺萬物萬物終嵗不復生君行暴虐誅殺暴罪天應其行旱霜殺萬物則終嵗不復生也虎按虐原本訛作唐注中又訛作今並據文改隂假威之應亦旱霣霜而殺物假威者言君使臣按問則臣反假君威而殺之心也天應其行亦旱霜殺萬物不言終嵗不復生何庻㡬君能覺悟誅之也君所殺下無復望故言終嵗不復生也按心也心字疑衍文至霣霜時根生榮不死至九月剥用事時當霣霜殺萬物今不霣霜萬物皆復榮不死也斯陽假與隂威之烈責隂假威誅按責字疑賊字之訛而隂不能誅好行大虐則旱霣霜好行小虐則水害物離各如之按離字疑當作雜卦字當霜霣者法廢九月剝用事當霣霜殺物化成今不霣者也陽無得則旱害物隂僣陽亦旱害物按後漢書郎顗傳引此文得作徳盖徳得古字通又隂字原本訛作陽今据傳文改正觀其政以别之陽之以木為災也於春夏水而殺萬物隂作之以水為害也於秋冬降隂不行君施不行而迎隂獨起為雨雨少必殺旱異者旱之而不害物也斯祿去公室福由下施故陽雖不施而隂通行之徳以成物也水異者而不害物也按水異者下据文疑脱水字斯陽欲誅而不能故降陽不時雨并合也降陽見南迎隂見北北不能雨白直黒而後雨或先迎而後降隂不下時迎隂不起承陽迎隂氣乆隂不雨亂氣雲之起也觀本所起卦人為之按此氣本從何卦起所從起卦人所為也降雲之隂君謀臣之隂迎雲之隂臣謀君之隂也太陽霓出地上少陽時並而聲微太陽正月泰卦霓出地上者陽散始出霓與地平少陽得時並而當雷少陽謂泰卦也用事於正月泰氣得用並臣強作威者使臨作反皆盗賊誅殺暴罪威行於下君得不降氣道積以時降後得同類并下故暴其入消息日圍雜卦用事以風雨若寒温入消息卦一二分一二日盡後見此前後名曰求雜卦用事以寒温若暴風雨徑出入消息卦一二分若一二侵徑出消息下雜卦名曰陵此皆臣侵之象漸也先犯之君不覺悟則圍君復不覺悟則侵此臣威令行也氣所𤼵陵所止共謀者也氣消息卦中出歴雜卦名曰乗及諸侯卦以寒温風雨而尊卑侵相乘皆如此故曰消息日圍也觀本所起卦人為之觀寒温若風雨本從何卦所起卦人為之也一則圍三年一圍後消息常不效三年則日蝕之兆也以風雨濟止時為期晝止則晝蝕夜止則夜蝕曰按濟即霽字周禮太卜注引洪範濟曰圛晝則為蝕既暮則為星亡之蝕晝不蝕既暮不星亡不能成災為異而已矣三則圍三蝕三既若三星亡則圍者亡已滅之象也河出圖洛出書更有所命也還風雨起消息則陽誅罰妄還風雨起於消息卦中者君妄誅罰無罪消息居卦中卦而已不分則他卦為之還風雨自居卦分中則君自所為也出即分他卦人教君為主消息所為無害物也卦人教君為之則風雨害物以此别之一日還風從公入消息者臣率君為非也從消息入侯卦者君率臣為非上侵下侵等卦今按正文息字上据注當有消字原本脱補入上有隂百二十日為雨上六用事後勝小畜温也語按此與上下文不相類注中勝小畜温之義亦不倫今覈其文與上左為右前為後注内二百二十日降為卒雨云云詞義相連盖本為一節錯誤在此以致首尾舛互當為正文云上有隂百二十日為雨注云上六用事後一百二十日降為卒雨又正文云其有陽二百二十日而風注云謂上九用事後一百二十日降為卒風文意明白自無可疑又注内勝小畜温也五字當屬前小畜乾位比息之卦當勝雜卦注内之文錯出於此别相侵則一實氣不以貎寒温為實白濁清凈為貌别相侵以白濁清净也有實無貎屈道人也有寒温無白濁清淨此賢者屈道仕於不肖之君也顗按屈道仕三字原本作屬壯今据後漢書郎傳注所引文改正有貎無實佞人也有白濁清淨無寒温比佞人以便巧仕於世也賢者有美道上屈不肖君但無實氣效耳佞人無美道可以便巧仕故但貎氣效之注按原本注文便巧仕下脱於世二字今據郎顗傳増入消息無為屈故無效也消息至尊無上但效寒温不效貎氣也説消息上無所屈但貎皆相應也故無貎矣剝隂氣上達霣霜以降剥九月之卦隂氣上達於五霜始降副殺萬物寒氣以殺萬物成刑寒氣當殺落萬物嵗成熟其長大而刑之萬物成也不至則太隂不强霜不以時降萬物必有不成刑者則有傷年之灾此君弱刑罰法度廢不行之象也傷年者傷霜當傷生物也一曰太隂不强則其日蝕微則其旱為霜𤼵於衝日其無赤但霜相按霜不以時降以下十九字與上文霣霜以降云云對當為正文原本混入注中今訂正十一月微温比十月十月離卦九三上六效温如十月之氣也按上六當作上九其决温比九月九三六二效温如九月氣按六二當作上六三月微寒比二月以决寒比正月三月雜卦六三上六微寒如二月之氣六三上九决寒如正月之氣脱按原本正文微下寒字今据文増入冬至之後三十日極寒三十日後大寒過正為實夏至日之後三十日極温三十日後大温過正為實仲春之後微温却三十日仲春者春分也决温却六十日至夏至也微者則知於身决絶者可知上按据注决温當有脱文冬寒過甚有所害亦賊隂也賊隂亦為圍蝕於正陽蝕者月蝕隂侵陽臣殺君之應正按原本賊隂俱作則隂今辨訛改正陽者二月至四月陽氣用事時也三月之末四月之本於是蝕日者世子所殺也或二月之末三月之末四月之本於是蝕日人君所殺也蝕必以怒上者傷君蝕於下者傷民下也蝕日月相薄之日在前後各鄉隂之地侵之或不從隂所来者有行事師不載太平時隂陽和合風雨咸同海内不偏地有阻險故風有遲疾雖太平之政猶有不能均同也唯平均乃不鳴條故欲風於亳亳者陳留也按自太平時以下隋書王劭𫝊引其文原本以太平二字入正文而時隂陽以下俱混入小注今據劭𫝊改正又亳者陳留原本作亳有陳離今亦據王劭𫝊改正蟲食木實曰髙謂食木顛斯割下啖上之異食心曰内下比掩惡適足以害民食外曰莘食下曰根斯教令煩擾不任職也以政别之各以蟲所居别知其吏文按此九字當為注原本混入正今訂正非真而直按此四字疑有誤蟲子生人畜生人也其非人也必害良臣愛命者小人也故必害良臣也蟲子生人者言隂以更生陽其非人也者物蟲子生人支體有不具者若人生六畜物也然必害良臣猶紫奪朱正按蟲子生人者以下當為注原本混入文今改正噬嗑反則有口實之變治道得則隂物變為陽物葱變為韭亦是引按隋書王劭傳此文又引鄭康成注有此六字原本脱今補入其反也則陽物變為隂物祐斷復生若以死象生按漢書五行志引京房易𫝊有斷枯復生之語則祐斷當作枯斷葦生不過一嵗竹生不過四嵗他物比之竹葦九禁為人辟也木知比也按此四句當有脱誤日食之比隂得陽蒙之比也隂冐陽也蒙氣也比非一也邪臣謀覆冐其君先霧從夜昏起或從夜半或平日君不覺悟日中不觧遂成蒙君復不覺悟下為霧也入按此注文見於後漢書郎顗𫝊注内原本全脱今補又原本正文脱日字陽字又也字訛耶冐字訛謂今並據郎顗𫝊注改正黄之比知善不舉青白之比疑也黒之比不掩惡也白之比弱也赤之比色元也按元字疑誤霓之比無徳以色親也霓邪氣也隂無徳以好色得親幸於陽也按後漢書楊賜𫝊引此文稱中孚經又引鄭注云云原本全脱今補入震之比隂不靜風逆之比隂假作也旱之比隂潜陽起也寒燠之比亂水比隂賞誅逆霣霜之比隂假威霧之比隂亂陽臣亂其君政事黒一日黄滿五日赤三日皆太陽色蒙亦然也過乃為異象八十二日變下為青白霧白者象物氣白也青者象㓜雜任事象於消息者一日後六日霧極六日為三十六日霧雜卦各以日君不覺後七十二日變為赤黄君復不政三年蝕於正陽二三四也入按君不覺三字原本混注文今訂正蝕一辰蝕者日蝕辰者辰開寒燠水旱一時風雨逆霣𤼵旬中象者氣也象氣起而太陽強而眀者陽覺寤其危悖辱異乃行黄之色悖如麴塵白青之色如縹太陽色白青狀如縹青也按原本如縹上脱色字今据文増黒之異在日中分分也黒色分分在日中惡見臣有戒殺君不過三日按分分疑當作雰雰漢書五行志雰氣寒是也白之色白而不照其色悖太陽白無明但陽體存悖悖狀如廢赤之色煇煇也太陽色無明赤然但體在赤中赤不過為疾病其色眀者無能也霓者氣也霓氣起在日側其色赤青白黄在日旁震者地動也陽不靜之象風之為異東西南北嘿無度按嘿字疑有誤其逆者觸也水者雨也雨或不生寒者非其寒也燠温也其時節温也逆霣者旱霜一曰賊隂也雺者霧也一曰乆隂不雨霧之比也陽感天不旋日諸侯不旋時大夫不過期陽者天子為善一日天立應以善為惡一日天立應以惡諸侯為善一時天立應以善為惡一時天立應以惡大夫為善一嵗天立應以善為惡一嵗天亦立應以惡一説云不旋日立應之不過時三辰間不過期從今日至明日也陽即指天子也按後漢書郎顗𫝊引此文稱中孚𫝊又引鄭註云云原本全脱今增入凡異所生灾所起各以其政變之則除其不可變則施之亦除改其政者謂失火令則行水令失土令則行木令失金令則行火令則灾除去也不可變謂殺賢者也施之者死者不可復生封祿其子孫使得血食則灾除也原按郎顗𫝊註引鄭注有此文原本全脱今補入又按本政訛卦除訛隂今並據郎顗𫝊註改正祿之除也無以成三必敗或不改不祿而灾曰除者按以上文有脱誤觀本所起以知存亡有此灾異不改祿三不禄天更光明隂陽和列星不失度乃賢者時政也明天之意去此卿来者常故得政卦人存常不無失者卦人亡按此註文有脱誤於中録於七經按黄震日抄稱通卦騐有於七經於河洛之目於理無所考今通卦騐並無此目其文反見稽覽圖又不言於河洛而言於中錄似是題篇之名而義不可曉今姑仍舊文乾十一月小君賢臣佐上天下有作謀九錄之文天下風雨揠禾威政復聖人自西北立坤六月有女子任政一年𫝊為復五月有貧之從東北来立大起土邑西北地動星墜陽衛按隋書王劭𫝊引此文而為之釋曰坤六月者坤徳在未六月建未一年𫝊為復者復是坤之一世卦陽氣初生五月貧之者貧之當為真人字之誤也原本任訛作滛邑訛作色又脱立字今並据劭𫝊改正屯十一月神人從中山出趙地動北方三十日千里馬數至按隋書王劭𫝊引此文而釋之曰屯十一月神人從中山出者此卦動而大亨作趙地動者中山為趙地以神人將去故變動千里馬者屯卦震下坎上震於馬作足坎於馬為羙脊也原本月上脱一字又脱地動二字今並据劭𫝊改正蒙正月天下東北經顔色陽國水大溢陽泉需四月常從西北方進陽来名来公東海移北三里夏雨寜陽隂二十三日易君三年訟三月下與上訟爭設行三月河水不流三有徳者祀之水乃西行兵甲事河十年有大水古訟牛出領北山東北師四月師動兵臨晋及謀於呉兵還太山東南西北二十民死驚死生之憂三官地動大星下民驚於水元師坤下故受流坤師號曰躋戒秋分比四月骨肉之親爭周文王武當有女子立六年三死小畜四月多風雨少民苦有三牛青三角出東南河海之濵杜衛侍兵之矣履六月人民清係扁逆賞八尺二寸戒并易樂少雨西北神絶祝日在貴人泰十月天生死女子用政八九年中子要有未疵代之兵起西北東南三年觧天乆隂賢趙陵為佐典日再中食戒否六月天下分為國足無賢人政亂大風揚名三陽晉書山趙秦承之兩月民盡見之同人七月炎帝與天同光其趙起及困未開上守下為民賊天下馬數下山東三年天下大樂戒充煩戒之六年雨未黄龍下東北大有四月天下甘露神雀出咸陽名上百獸官撫其上安謙十二月地大喊列名肥西南有壤壊山侵道大通天均光三日去有兵一年死女子家豫二月天氣神龜出室三牧侯一年東海濟南垣上戊巳莫見九曹政不均三出随二月四年天下地中有雷在王庭國家大驚易君如有出蟲在市中白虹貫日蝕三蠱四月六年二月有外國来見神於國王以殺名臣見其年并禹折木疾水兵西方臨三月三年兵謀隂言從事南隂池是頭後有衝骨西方名牧卉夏屬觀八月外國從西方来龍物王吕女後大亂受法乗馬天下皆傷大風女子貴噬嗑五月小人任政獄訟象衆兵大行備矣至二有名尸尸賁八月師國家本吕上二月死有神徃来王合神獸戰下東海剝九月小人復君子三年大道通丁正吉東北西南復十一月初氣元有年死君二年小邦王為正月六年大得削王復及國其祠武夷天下臨不雨九月觧旡妄九月天下無雲而雷三十日之外雷行夜從西南正東北位濟邑有中國周用上宫武在第大畜八月天徳明王侯人去城十二年天下大昌女子立政三年去此地大神獸来見至堂三年大獸出東北臺邑河邑頥十二月有君王自敵三年葵邱興臨養民年西南有懐山立三國去禹髙官故遺人馬生角六年三日並出大過十二月子旡下父去死東野澤海濵若壊在咸市衆民西臺上地中及年天下憂衆死者習坎十一月不凍二破燕壊齊小國外不節賢人於西来佐王年之大昌離五月天下大旱女子滛男子滛各持其兵外鄉三年盡小兒出十二年合鄉邑在南西端倉邑咸五月者天子去小人老是得天下之元易官西南華為重重代六年昌大維来見恒六月小人勝君子奪其愛六年天下魁若代成曰烏卬郡鳴邑上是年百川及行盡不通遯卦大壯三月小人用事君子奪之女子為政九年後後來立五帝出五帝出白帝見黒山北晋四月有明蒐之王喜進出用者衆天下東行西南北侯至列先四年明夷十二月赤大生屬陽若陽若在邑東百三十里五帝弟中國生大㧞七月大水出其下見家人五月小家子出之井山之陽宗室亂孤人刑冠政堂當生蓬蒿四年復睽十二月始王易服邑國子南大滛四月大行殊髙陽元武王之起南方蹇十二月大鳥在蛟龍戱深淵北王天下命生元武樂三大山變易觧二月大旱下民東北邱䑓二年元受易刑名嗣絶三年王嗣民司無名民思損十二月兵賊重三年自與天下小逆流大鳥下其邑天蒙北背白出西北方益十月上下相益民年天下疾龍起邑東南維北軍山東於上大風壊屋夬五月天下四月人生在邑北替邑城南水上江河逆三月小人用事姤五月天下女盡堂正一女五夫王家滛天下不治三年萃九月天下聚衆相謀兵起車馳人驟来人西方白色天下昌其見陽生堂下升十二月女子守十年下邑東北来立易變政治天地有心士衆賢爭養不死二侯三人女子殺之正北左行第一困九月小人来君子去小國破賢人亡兵行諸免之生六年不義血兵刄小起東北取立死井四月水衆通出地凉東兵河梁大名把在北方白懐絶爰漢家禍革六月五榖傷及草木旱熱赤地千里大官炊火鼎五月吳人君天與延年齒東北中庻人王髙徳之震二月大海濯地至水之洫於上度得起天年女立政八年艮十二月君臣仁兵行三月地動其年旱有人從東北来長眉僂周鄭漸二月有侯少仁彊有外兵四方不死地變有大鳥東南歸歸妹十一月成威立王二十七婦及小國與神水芒成湯兵豐空無人大憂死小人無兵革旅傷旱憂秋冬旱兵憂死泰巽四月春生火風折木傷五榖風死秋風死兊八月立秋女子榮其家蔑大将養任易君二世夷四圖來歸偏水大出東同齊南不分渙五月有諸侯離邑為民欲得将兵水復旱金䥫貴髙者興晋千邑武侯節六月安國有惡君天下鳥多白兔緯拘見天下日泉神路天下大山出蒙之處有移河不死中孚十二月人君之世安寜中孚女子亂世於外天不信地數動中國祖絶嗣上君驚於兵北夷衛隗小過正月小過洫於中兵起於夷南故邑牛䍧歸鄉侯不勝是年有大水死王三人東北大動晝昏日再中北方有貴人子走於紂既濟九月年大水地臨三年不絶六世多血未濟有故都破水國來兵四年九月有分國陽殊邑按以上依六十四卦次序各為之辭盖即毖緯之文語多艱深不可曉而訛脱尤甚據王劭稱貧之二字為真人之誤則知自隋以前其書已有差錯今既無别本可證姑仍舊文録之
